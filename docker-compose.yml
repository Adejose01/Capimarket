services:
  frontend:
    build: .
    ports:
      - "8080:80"
    depends_on:
      - pocketbase
    restart: unless-stopped

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    command: ["serve", "--http=0.0.0.0:8090"]
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/pb_data
      - ./pb/pb_migrations:/pb_migrations
    restart: unless-stopped

volumes:
  pb_data:
