version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Se inyecta la URL de PocketBase al momento de hacer el npm run build
        - VITE_PB_URL=${VITE_PB_URL:-/}
    ports:
      - "3000:80" # Exponemos el frontend también en el puerto 3000 por si lo necesitas directo
    depends_on:
      - pocketbase
    restart: unless-stopped

  pocketbase:
    build:
      context: .
      dockerfile: Dockerfile.pb
    ports:
      - "8090:8090" # Acceso directo a PocketBase y su panel de admin
    env_file:
      - .env
    environment:
      - PB_ADMIN_EMAIL=${PB_ADMIN_EMAIL}
      - PB_ADMIN_PASSWORD=${PB_ADMIN_PASSWORD}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_SENDER_NAME=${SMTP_SENDER_NAME}
      - SMTP_SENDER_ADDRESS=${SMTP_SENDER_ADDRESS}
    volumes:
      - ./pb/pb_data:/pb/pb_data
      - ./pb/pb_migrations:/pb/pb_migrations
      - ./pb/pb_hooks:/pb/pb_hooks
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80" # El Nginx actuará como el gateway principal en http://localhost
    volumes:
      - ./nginx/local.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - pocketbase
    restart: unless-stopped
